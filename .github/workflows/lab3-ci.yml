name: Java CI for Lab 3

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Оновлено до v4 (прибере попередження)

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Оновлено до v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download JUnit and Run Tests
        run: |
          mkdir -p lib bin
          # Завантажуємо свіжу версію JUnit Standalone
          curl -L https://repo1.maven.org/maven2/org/junit/platform/junit-platform-console-standalone/1.10.2/junit-platform-console-standalone-1.10.2.jar -o lib/junit-standalone.jar
          
          # Компілюємо весь код лаби разом із бібліотекою
          javac -d bin -cp "lib/junit-standalone.jar:." LAB_3/src/*.java LAB_3/test/*.java
          
          # Запускаємо тести, вказуючи шлях до скомпілованих класів у bin
          java -jar lib/junit-standalone.jar --class-path bin --scan-class-path --fail-if-no-tests